<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smoothify</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      width: 100%;
      height: 100%;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to bottom right, #ffe0e0, #ffecd2, #f9c5d1);
      overflow: hidden;
    }

    .navbar {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 10;
    }

    .navbar a {
      margin-left: 20px;
      text-decoration: none;
      font-weight: bold;
      color: #d7263d;
      font-size: 1.2rem;
      background: #fff3f3;
      padding: 8px 16px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      transition: background 0.3s ease;
    }

    .navbar a:hover {
      background: #ffe0e0;
    }

    .container {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      height: 100vh;
      position: relative;
    }

    h1 {
      font-size: 4rem;
      color: #e05263;
      margin-bottom: 10px;
      animation: fadeIn 2s ease-in;
      z-index: 2;
    }

    .tagline {
      font-size: 1.5rem;
      color: #a60039;
      margin-bottom: 20px;
      text-align: center;
      animation: fadeIn 3s ease-in;
      z-index: 2;
    }

    .fruit-scene {
      position: relative;
      width: 100vw;
      height: 85vh;
      overflow: hidden;
    }

    .fruit-scene img {
      position: absolute;
      width: 25vw;
    }

    .kiwi {
      top: 5%;
      left: -30vw;
      animation: moveToCenterKiwi 3s ease-in-out forwards;
      z-index: 2;
    }

    .strawberry {
      top: 5%;
      right: -30vw;
      animation: moveToCenterStrawberry 3s ease-in-out forwards;
      z-index: 2;
    }

    .smoothie {
      opacity: 0;
      top: 2%; 
      left: 50%;
      transform: translate(-50%, 0) scale(0.5);
      animation: smoothiePop 5s ease-in-out forwards;
      z-index: 3;
    }

    @keyframes moveToCenterKiwi {
      0% { transform: translateX(0); opacity: 1; }
      50% { left: 50%; transform: translateX(-50%) scale(1.2); }
      100% { left: 50%; transform: translateX(-50%) scale(0); opacity: 0; }
    }

    @keyframes moveToCenterStrawberry {
      0% { transform: translateX(0); opacity: 1; }
      50% { right: 50%; transform: translateX(50%) scale(1.2); }
      100% { right: 50%; transform: translateX(50%) scale(0); opacity: 0; }
    }

    @keyframes smoothiePop {
      0%, 60% { opacity: 0; transform: translate(-50%, 0) scale(0.3); }
      100% { opacity: 1; transform: translate(-50%, 0) scale(1); }
    }

    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(-20px); }
      100% { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="navbar">
    <a href="#">Home</a>
    <a href="menu.html">Menu</a>
    <a href="about_contact.html">About Us</a>
    <a href="about_contact.html">Contact</a>  </div>

  <div class="container">
    <h1>Smoothify</h1>
    <p class="tagline">"Make your day smoother and special with our delicious smoothies"🍷</p>
    <div class="fruit-scene">
      <img src="images/kiwi.png" alt="Kiwi" class="kiwi" />
      <img src="images/strawberry.png" alt="Strawberry" class="strawberry" />
      <img src="images/smoothie.png" alt="Smoothie" class="smoothie" />
    </div>
  </div>
</body>
</html>
